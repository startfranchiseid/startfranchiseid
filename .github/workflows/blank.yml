name: Supabase Keep Alive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    environment: SUPABASE_URL
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

      - name: Ping Supabase REST endpoint
        run: |
          set -euo pipefail
          base_url="${SUPABASE_URL%/}"
          endpoint="${base_url}/rest/v1/franchise_schedules?select=id&limit=1"

          echo "Pinging ${endpoint}"

          max_attempts=3
          attempt=1
          while [ ${attempt} -le ${max_attempts} ]; do
            http_code=$(curl -sS -o /tmp/keepalive-response.txt -w "%{http_code}" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Accept: application/json" \
              --connect-timeout 10 \
              --max-time 25 \
              "${endpoint}" || echo "000")

            echo "Attempt ${attempt}/${max_attempts} -> HTTP ${http_code}"

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Keep-alive success."
              cat /tmp/keepalive-response.txt
              exit 0
            fi

            if [ ${attempt} -lt ${max_attempts} ]; then
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "Keep-alive failed after ${max_attempts} attempts."
          cat /tmp/keepalive-response.txt || true
          exit 1
